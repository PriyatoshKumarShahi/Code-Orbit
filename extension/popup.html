<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Parakh: The Truth Filter</title>
  <style>
    :root {
      --bg-color: #f4f4f0;
      --text-color: #111;
      --border-color: #111;
      --accent-pink: #ff61d8;
      --accent-yellow: #f4ed38;
      --accent-cyan: #00e5ff;
      --danger-red: #ff3333;
      --success-green: #33ff57;
      --warning-orange: #ff9900;
    }
    
    body {
      margin: 0;
      padding: 15px;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s;
      width: 380px;
      min-height: 450px;
      box-sizing: border-box;
    }

    body.high-alert {
      background-color: var(--danger-red);
      color: #fff;
    }
    
    body.high-alert .card {
      background-color: #fff;
      color: #111;
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      margin: 0 0 15px 0;
      border-bottom: 4px solid var(--border-color);
      padding-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lang-toggle {
      font-size: 12px;
      padding: 4px 8px;
      background: var(--accent-yellow);
      border: 2px solid var(--border-color);
      box-shadow: 2px 2px 0px var(--border-color);
      cursor: pointer;
      font-weight: bold;
    }

    .lang-toggle:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--border-color);
    }

    .card {
      background: #fff;
      border: 3px solid var(--border-color);
      box-shadow: 4px 4px 0px var(--border-color);
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .card.accent-pink { box-shadow: 4px 4px 0px var(--accent-pink); }
    .card.accent-cyan { box-shadow: 4px 4px 0px var(--accent-cyan); }
    .card.accent-yellow { box-shadow: 4px 4px 0px var(--accent-yellow); }

    h2 {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      font-weight: 900;
      font-size: 14px;
      border: 2px solid var(--border-color);
      text-transform: uppercase;
    }

    .meter-container {
      width: 100%;
      height: 20px;
      border: 2px solid var(--border-color);
      background: #ddd;
      margin-top: 10px;
      position: relative;
    }

    .meter-fill {
      height: 100%;
      background: var(--success-green);
      width: 0%;
      transition: width 0.5s ease-in-out;
    }

    .tree-node {
      border-left: 4px solid var(--border-color);
      padding-left: 10px;
      margin-bottom: 10px;
      position: relative;
    }

    .tree-node::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 5px;
      width: 10px;
      height: 4px;
      background: var(--border-color);
    }

    .tree-year { font-weight: bold; font-size: 12px; background: var(--accent-yellow); padding: 2px 4px; border: 1px solid #000; }
    .tree-title { font-size: 14px; margin-top: 4px; }

    #loading {
      display: none;
      text-align: center;
      font-weight: bold;
      padding: 20px;
      background: var(--accent-cyan);
      border: 3px solid var(--border-color);
      box-shadow: 4px 4px 0px var(--border-color);
      margin-bottom: 20px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    #error {
      display: none;
      background: var(--danger-red);
      color: white;
      border: 3px solid var(--border-color);
      padding: 10px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .text-preview {
      font-style: italic;
      font-size: 12px;
      color: #555;
      margin-bottom: 15px;
      border-left: 3px solid #ccc;
      padding-left: 10px;
      word-break: break-word;
    }

    /* Initial hidden states */
    #results-container { display: none; }
    #empty-state {
      text-align: center;
      padding: 40px 10px;
      font-weight: bold;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>Parakh <button class="lang-toggle" id="lang-btn">EN/HI</button></h1>

  <div id="empty-state">
    Select text on any webpage or click "Verify" on WhatsApp Web to analyze a claim.
  </div>

  <div id="loading">🔍 Analyzing Claim...</div>
  <div id="error"></div>

  <div id="results-container">
    <div class="text-preview" id="preview-text"></div>

    <div class="card accent-pink">
      <h2>Truth Meter</h2>
      <div class="badge" id="verdict-badge">Waiting...</div>
      <p id="explanation" style="font-size: 14px; margin-top: 10px; line-height: 1.4;"></p>
      
      <div class="meter-container">
        <div class="meter-fill" id="risk-meter"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:bold; margin-top:5px;">
        <span>Real</span>
        <span>Fake</span>
      </div>
    </div>

    <div class="card accent-cyan" id="impact-card">
      <h2>Societal Impact</h2>
      <div style="margin-bottom: 10px;">
        <strong style="font-size: 13px;">⚠️ Consequences:</strong>
        <p id="consequences" style="font-size: 13px; margin: 5px 0 0 0;"></p>
      </div>
      <div>
        <strong style="font-size: 13px;">🌍 Social Impact:</strong>
        <p id="social-impact" style="font-size: 13px; margin: 5px 0 0 0;"></p>
      </div>
    </div>

    <div class="card accent-yellow" id="family-card" style="display:none;">
      <h2>Family Tree</h2>
      <div id="family-tree-list"></div>
    </div>

    <div class="card" style="box-shadow: 4px 4px 0px #00e5ff;">
      <h2>Chain of Trust</h2>
      <p style="font-size: 13px; margin:0;">
        <strong id="flag-count">0</strong> people using Parakh have flagged similar variations of this message.
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
